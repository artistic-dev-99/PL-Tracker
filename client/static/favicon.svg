<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#090d16"/>
    </linearGradient>
    <linearGradient id="keyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Large Circular Badge Background -->
  <circle cx="32" cy="32" r="29" fill="url(#bgGrad)" stroke="#00d4ff" stroke-width="2.5" stroke-opacity="0.7"/>

  <!-- Large Minimalist Key Path -->
  <g transform="translate(11, 11) scale(1.75)" filter="url(#glow)">
    <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.778zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4" 
          fill="none" 
          stroke="url(#keyGrad)" 
          stroke-width="2.2" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
  </g>
</svg>
